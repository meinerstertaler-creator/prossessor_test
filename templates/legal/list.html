{% extends "base.html" %}

{% block content %}
<h2>Rechtliche Bewertungen</h2>

<div class="card">
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-striped table-hover align-middle">
                <thead>
                    <tr>
                        <th>Verfahren</th>
                        <th>Fachbereich</th>
                        <th>Mandant</th>
                        <th>Aktion</th>
                    </tr>
                </thead>
                <tbody>
                    {% for item in items %}
                    <tr>
                        <td>{{ item.title }}</td>
                        <td>{{ item.department|default:"—" }}</td>
                        <td>{{ item.tenant|default:"—" }}</td>
                        <td>
                            <a class="btn btn-sm btn-primary" href="{% url 'legal_assessment_edit' item.id %}">
                                Bearbeiten
                            </a>
                        </td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="4">Keine Verfahren gefunden.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
