{% extends "base.html" %}

{% block title %}Analysetext löschen{% endblock %}

{% block content %}
<div class="card">
    <div class="card-body">
        <h1 class="h4 mb-3">Analysetext löschen</h1>
        <p>Möchtest du den Text <strong>{{ item.title }}</strong> wirklich löschen?</p>

        <form method="post">
            {% csrf_token %}
            <div class="d-flex flex-wrap gap-2">
                <button type="submit" class="btn btn-danger">Löschen</button>
                <a href="{% url 'knowledge:analyse_text_list' %}" class="btn btn-outline-secondary">Abbrechen</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
